global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: watermelon-api
    metrics_path: /metrics/prometheus
    static_configs:
      - targets: ["api:3000"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
