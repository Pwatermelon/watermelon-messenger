# Production stack — pull images from Docker Hub, TLS via certbot.
# Usage on server:
#   cp deploy/.env.example .env && nano .env
#   ./scripts/certbot-init.sh   # first time only
#   docker compose -f deploy/docker-compose.yml --env-file .env up -d
#
# Наружу только web (80/443). Postgres, Redis, Scylla, MinIO — только внутри docker-сети.

name: watermelon-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: melon
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always

  scylla:
    image: scylladb/scylla:6.0
    restart: always
    command: --smp 1 --memory 1G --overprovisioned 1
    volumes:
      - scylladata:/var/lib/scylla

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
      S3_BUCKET: ${S3_BUCKET:?set S3_BUCKET in .env}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$S3_BUCKET
      "

  api:
    image: plwatermelon/watermelon-messenger-api:${WM_VERSION:?set WM_VERSION}
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/melon
      REDIS_URL: redis://redis:6379
      SCYLLA_CONTACT_POINTS: scylla
      SCYLLA_KEYSPACE: melon
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      MESSAGE_AT_REST_KEY: ${MESSAGE_AT_REST_KEY:?set MESSAGE_AT_REST_KEY}
      PORT: "3000"
      WEB_URL: ${WEB_URL:?set WEB_URL}
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID:?set YANDEX_CLIENT_ID}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET:?set YANDEX_CLIENT_SECRET}
      YANDEX_REDIRECT_URI: ${YANDEX_REDIRECT_URI:?set YANDEX_REDIRECT_URI}
      YANDEX_NATIVE_REDIRECT_URI: ${YANDEX_NATIVE_REDIRECT_URI:-watermelon://oauth/yandex}
      ADMIN_YANDEX_IDS: ${ADMIN_YANDEX_IDS:-}
      ADMIN_YANDEX_LOGINS: ${ADMIN_YANDEX_LOGINS:-platinumwatermelon}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID:-}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY:-}
      PLATINUM_PRICE_RUB: ${PLATINUM_PRICE_RUB:-299}
      API_PUBLIC_URL: ${API_PUBLIC_URL:?set API_PUBLIC_URL}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@watermelon-messenger.ru}
      E2E_TEST_SECRET: ""
      MEDIA_STORAGE: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:?set S3_BUCKET in .env}
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
      GRAFANA_INTERNAL_URL: http://grafana:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      scylla:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    # healthcheck убран: в старых образах нет curl, /health отдаёт 503 — web блокировался

  web:
    image: plwatermelon/watermelon-messenger-web:${WM_VERSION:?set WM_VERSION}
    restart: always
    depends_on:
      api:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./${WM_NGINX_CONF:-nginx.http.conf}:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-conf:/etc/letsencrypt:ro

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: always
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
      - promdata:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    depends_on:
      api:
        condition: service_started

  grafana:
    image: grafana/grafana:11.4.0
    restart: always
    environment:
      GF_SERVER_ROOT_URL: ${WEB_URL:?set WEB_URL}/api/admin/observability/
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-grafana-internal-only}
      GF_USERS_DEFAULT_THEME: dark
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_DISABLE_SIGNOUT_MENU: "true"
      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER_NAME: X-Watermelon-Admin
      GF_AUTH_PROXY_HEADER_PROPERTY: username
      GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_NEWS_NEWS_FEED_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./monitoring/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: always
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: always
    environment:
      DATA_SOURCE_NAME: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/melon?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    restart: always
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      - redis

volumes:
  pgdata:
  scylladata:
  miniodata:
  promdata:
  grafanadata:
  certbot-www:
  certbot-conf:
