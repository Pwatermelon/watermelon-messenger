<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.ico" sizes="32x32" />
  <link rel="icon" href="/icon-32.png" type="image/png" sizes="32x32" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <meta
    name="description"
    content="Запрошенная страница Watermelon Messenger не найдена."
  />
  <title>404 — страница не найдена | Watermelon Messenger</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1115;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --accent: #e84855;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 1.5rem;
    }
    main {
      max-width: 28rem;
      text-align: center;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 4rem;
      font-weight: 700;
      color: var(--accent);
    }
    p { margin: 0 0 1.25rem; color: var(--muted); line-height: 1.5; }
    a {
      color: #fff;
      background: var(--accent);
      text-decoration: none;
      padding: 0.65rem 1.1rem;
      border-radius: 8px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1>404</h1>
    <p>Страница не найдена. Возможно, ссылка устарела или адрес введён с ошибкой.</p>
    <a href="/">На главную</a>
  </main>
</body>
</html>
